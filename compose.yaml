name: percona-toolkit-sample

# Percona Server の binlog / slowlog はデフォルト datadir 配下に置く。
# 別ボリュームを分けると docker init で作られたディレクトリの所有権 (root) と
# mysql ユーザが衝突して起動失敗するため、ここでは datadir 内に統一している。

services:
  source:
    image: percona/percona-server:8.0
    container_name: pt-source
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/source/init:/docker-entrypoint-initdb.d:ro
      - source-data:/var/lib/mysql
    command: >
      --server-id=1
      --log-bin=/var/lib/mysql/mysql-bin
      --binlog-format=STATEMENT
      --slow-query-log=ON
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=0
      --log-output=FILE
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 40

  replica:
    image: percona/percona-server:8.0
    container_name: pt-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "13307:3306"
    volumes:
      - replica-data:/var/lib/mysql
    command: >
      --server-id=2
      --log-bin=/var/lib/mysql/mysql-bin
      --binlog-format=STATEMENT
      --relay-log=/var/lib/mysql/mysql-relay
      --read-only=ON
      --report-host=replica
      --report-port=3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      source:
        condition: service_healthy

  toolkit:
    image: perconalab/percona-toolkit:3.7.1
    platform: linux/amd64
    container_name: pt-toolkit
    # ツール実行は scripts/*.sh から `docker compose exec` で呼び出すので待機させる
    entrypoint: ["sleep", "infinity"]
    depends_on:
      source:
        condition: service_healthy
      replica:
        condition: service_healthy

volumes:
  source-data:
  replica-data:
